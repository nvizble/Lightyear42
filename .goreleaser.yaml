# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: lightyear

before:
  hooks:
    - go mod tidy

builds:
  - id: lightyear
    main: ./cmd/lightyear
    binary: lightyear
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/nvizble/Lightyear42/cmd.Version={{.Version}}
      - -X github.com/nvizble/Lightyear42/cmd.Commit={{.ShortCommit}}
      - -X github.com/nvizble/Lightyear42/cmd.BuildDate={{.Date}}

archives:
  - id: default
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

release:
  github:
    owner: nvizble
    name: Lightyear42
  draft: false
  prerelease: auto
  name_template: "lightyear {{.Tag}}"
